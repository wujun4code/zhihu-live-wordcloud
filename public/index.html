<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>你心中的知乎 · 实时词云</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    /* 品牌深蓝底：知乎蓝色阶深端 #17314d 衍生 */
    background: radial-gradient(ellipse at 50% 42%, #14273d 0%, #0e1a2c 60%, #0a1220 100%);
    color: #eaf2fd;
  }
  #stage { position: absolute; inset: 0; }
  canvas.cloud {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transition: opacity .6s ease;
  }
  header {
    position: absolute; top: 30px; left: 0; right: 0;
    text-align: center; pointer-events: none; z-index: 5;
  }
  header h1 {
    font-size: clamp(22px, 3vw, 40px); font-weight: 700; letter-spacing: 2px;
  }
  header h1 .hl { color: #4d95ff; }
  header p { margin-top: 6px; font-size: clamp(12px, 1.2vw, 18px); color: #75acfe; opacity: .75; letter-spacing: 1px; }
  .qr-card {
    position: absolute; right: 20px; bottom: 20px; z-index: 5;
    background: #fff; border-radius: 10px; padding: 8px 8px 6px;
    text-align: center; box-shadow: 0 4px 18px rgba(0, 0, 0, .35);
  }
  .qr-card #qr { display: block; line-height: 0; }
  .qr-card #qr img {
    display: block;
    width: clamp(72px, min(9vw, 13vh), 116px); height: auto;
    image-rendering: pixelated;
  }
  .qr-card .tip { margin-top: 5px; font-size: 12px; font-weight: 600; color: #121212; }
  .qr-card .url { margin-top: 1px; font-size: 9px; color: #8590a6; }
  @media (max-width: 640px) {
    .qr-card { right: 12px; bottom: 12px; padding: 6px 6px 4px; border-radius: 8px; }
    .qr-card #qr img { width: clamp(56px, 16vw, 80px); }
    .qr-card .tip { font-size: 10px; margin-top: 3px; }
    .qr-card .url { display: none; }
    .stats { left: 12px; bottom: 12px; font-size: 12px; }
    .stats b { font-size: 20px; }
  }
  .stats {
    position: absolute; left: 32px; bottom: 32px; z-index: 5;
    color: #75acfe; opacity: .9; font-size: 15px; letter-spacing: 1px;
  }
  .stats b { color: #4d95ff; font-size: 30px; font-weight: 700; margin: 0 6px; font-variant-numeric: tabular-nums; }
  .paused-badge {
    display: none;
    position: absolute; top: 32px; right: 32px; z-index: 5;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(252, 195, 4, .12); border: 1px solid rgba(252, 195, 4, .55);
    color: #fcc304; font-size: 14px; letter-spacing: 2px;
  }
  .empty-hint {
    position: absolute; left: 50%; top: 48%; transform: translate(-50%, -50%);
    color: #3c5a82; font-size: clamp(18px, 2vw, 28px); letter-spacing: 3px;
    pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>
  <header>
    <h1>用 1 个词描述 <span class="hl">「你心中的知乎」</span></h1>
    <p>扫右下角二维码，你的词马上出现在这里</p>
  </header>
  <div class="paused-badge" id="paused">已暂停收集</div>
  <div id="stage">
    <div class="empty-hint" id="empty">等待第一个词…</div>
    <canvas class="cloud" id="c1"></canvas>
    <canvas class="cloud" id="c2" style="opacity:0"></canvas>
  </div>
  <div class="stats">已收到<b id="total">0</b>个词</div>
  <div class="qr-card">
    <div id="qr"></div>
    <div class="tip">扫码参与</div>
    <div class="url" id="joinUrl"></div>
  </div>
<script src="/js/wordcloud2.js"></script>
<script src="/js/qrcode.js"></script>
<script>
(function () {
  // 知乎品牌蓝色阶（A-13）：频次越高越亮，已按深色底通过对比度校验
  var TIERS = ["#b2d0fe", "#75acfe", "#4d95ff", "#056de8"];

  var canvases = [document.getElementById("c1"), document.getElementById("c2")];
  var front = 0;
  var lastData = "";
  var lastList = [];
  var dpr = 1;

  // 现场排障：地址栏加 #debug 显示日志浮层
  var DBG = location.hash === "#debug";
  function dbg(m) {
    if (!DBG) return;
    var el = document.getElementById("dbg");
    if (!el) {
      el = document.createElement("div");
      el.id = "dbg";
      el.style.cssText = "position:absolute;left:8px;top:8px;z-index:99;color:#fff;font:12px monospace;white-space:pre;text-shadow:0 0 4px #000";
      document.body.appendChild(el);
    }
    el.textContent += m + "\n";
  }
  window.addEventListener("error", function (e) { dbg("ERR " + e.message + " @" + e.lineno); });

  function sizeCanvases() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvases.forEach(function (c) {
      c.width = window.innerWidth * dpr;
      c.height = window.innerHeight * dpr;
    });
  }

  // 设置 canvas.width 会清空画布，所以 resize 后必须立即重绘
  function handleResize() {
    dbg("resize " + window.innerWidth + "x" + window.innerHeight);
    sizeCanvases();
    if (lastList.length) {
      lastData = "";
      draw(lastList);
    } else {
      drawScene(canvases[front]);
    }
  }

  // 底座图形：知乎问答气泡。返回气泡几何信息
  // 底边收在 75% 高度，给右下二维码/左下统计留出走廊，互不遮挡
  function bubbleRect(W, H) {
    var bx = W * 0.08, bw = W * 0.84;
    var by = H * 0.16, bh = H * 0.59;
    return { bx: bx, by: by, bw: bw, bh: bh, r: Math.min(bw, bh) * 0.075, tailH: H * 0.06 };
  }

  function tracePath(ctx, g) {
    var bx = g.bx, by = g.by, bw = g.bw, bh = g.bh, r = g.r;
    var bot = by + bh;
    // 尾巴基部在底边左侧，指向左下角的扫码/统计区
    var t1 = bx + bw * 0.14, t2 = bx + bw * 0.26;
    var tipX = bx + bw * 0.075, tipY = bot + g.tailH;
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bw - r, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r);
    ctx.lineTo(bx + bw, bot - r);
    ctx.quadraticCurveTo(bx + bw, bot, bx + bw - r, bot);
    ctx.lineTo(t2, bot);
    ctx.quadraticCurveTo(t1 + (t2 - t1) * 0.4, bot, tipX, tipY);
    ctx.quadraticCurveTo(t1, bot + (tipY - bot) * 0.15, t1, bot);
    ctx.lineTo(bx + r, bot);
    ctx.quadraticCurveTo(bx, bot, bx, bot - r);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.closePath();
  }

  // 画遮罩场景：气泡外为不透明底色（词云禁区），气泡内透出页面背景（词云画布）
  function drawScene(canvas) {
    var ctx = canvas.getContext("2d");
    var W = canvas.width, H = canvas.height;
    var g = bubbleRect(W, H);
    ctx.clearRect(0, 0, W, H);
    // 与 CSS 背景一致的径向渐变
    var grad = ctx.createRadialGradient(W / 2, H * 0.42, 0, W / 2, H * 0.42, Math.max(W, H) * 0.75);
    grad.addColorStop(0, "#14273d");
    grad.addColorStop(0.6, "#0e1a2c");
    grad.addColorStop(1, "#0a1220");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // 挖出气泡内部
    ctx.save();
    ctx.globalCompositeOperation = "destination-out";
    tracePath(ctx, g);
    ctx.fill();
    ctx.restore();
    // 品牌蓝描边 + 微光
    ctx.save();
    ctx.shadowColor = "rgba(5, 109, 232, .5)";
    ctx.shadowBlur = 16 * dpr;
    ctx.strokeStyle = "rgba(77, 149, 255, .55)";
    ctx.lineWidth = 2 * dpr;
    tracePath(ctx, g);
    ctx.stroke();
    ctx.restore();
    // 气泡内的知乎式引号（半透明，词会自动避开）。
    // 必须 save/restore：textAlign/textBaseline 泄漏会让 wordcloud2 的
    // 绘制位置与碰撞检测错位，词会互相重叠
    ctx.save();
    ctx.fillStyle = "rgba(77, 149, 255, .28)";
    ctx.textBaseline = "top";
    ctx.font = "700 " + Math.round(g.bh * 0.15) + 'px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = "left";
    ctx.fillText("「", g.bx + g.bw * 0.02, g.by + g.bh * 0.04);
    ctx.textAlign = "right";
    ctx.textBaseline = "bottom";
    ctx.fillText("」", g.bx + g.bw * 0.98, g.by + g.bh * 0.97);
    ctx.restore();
    return g;
  }

  sizeCanvases();
  drawScene(canvases[0]);
  dbg("init " + canvases[0].width + "x" + canvases[0].height + " WC=" + typeof WordCloud);
  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleResize, 200);
  });

  // 二维码指向提交页 /join
  (function () {
    var url = location.origin + "/join";
    var qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    // 高清生成（cellSize 6），实际显示尺寸由 CSS clamp 控制
    document.getElementById("qr").innerHTML = qr.createImgTag(6, 12);
    document.getElementById("joinUrl").textContent = location.host + "/join";
  })();

  function draw(words) {
    lastList = words;
    var back = canvases[1 - front];
    var g = drawScene(back);
    var maxCount = words[0][1];
    var base = Math.min(g.bw, g.bh);
    dbg("draw n=" + words.length + " base=" + Math.round(base));

    WordCloud(back, {
      list: words,
      clearCanvas: false,
      backgroundColor: "transparent",
      origin: [g.bx + g.bw / 2, g.by + g.bh / 2],
      gridSize: Math.max(8, Math.round(base / 85)),
      weightFactor: function (count) {
        var r = Math.pow(count / maxCount, 0.6);
        return Math.max(base / 42, r * (base / 5));
      },
      color: function (word, count) {
        var r = count / maxCount;
        if (r >= 0.7) return TIERS[0];
        if (r >= 0.45) return TIERS[1];
        if (r >= 0.2) return TIERS[2];
        return TIERS[3];
      },
      fontFamily: '"PingFang SC", "Microsoft YaHei", sans-serif',
      fontWeight: 600,
      // wordcloud2 对 CJK 竖排词碰撞检测有缺陷会重叠，全横排（投屏可读性也更好）
      rotateRatio: 0,
      drawOutOfBound: false,
      shuffle: false,
    });

    // 双画布交叉淡入，避免重绘闪烁
    setTimeout(function () {
      dbg("swap -> " + (1 - front));
      back.style.opacity = 1;
      canvases[front].style.opacity = 0;
      front = 1 - front;
    }, 350);
  }

  function poll() {
    fetch("/api/words")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        dbg("poll total=" + d.total);
        document.getElementById("total").textContent = d.total;
        document.getElementById("paused").style.display = d.paused ? "block" : "none";
        document.getElementById("empty").style.display = d.total > 0 ? "none" : "block";
        var list = d.words.map(function (w) { return [w.word, w.count]; });
        var key = JSON.stringify(list);
        if (list.length && key !== lastData) {
          lastData = key;
          draw(list);
        }
      })
      .catch(function () { /* 网络抖动，下一轮重试 */ })
      .finally(function () { setTimeout(poll, 2000); });
  }
  poll();

  // F 键全屏
  document.addEventListener("keydown", function (e) {
    if (e.key === "f" || e.key === "F") {
      document.fullscreenElement
        ? document.exitFullscreen()
        : document.documentElement.requestFullscreen();
    }
  });

  // Wake Lock：防止投屏机器息屏
  if ("wakeLock" in navigator) {
    var acquire = function () {
      navigator.wakeLock.request("screen").catch(function () {});
    };
    acquire();
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") acquire();
    });
  }
})();
</script>
</body>
</html>
