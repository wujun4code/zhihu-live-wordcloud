<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>你心中的知乎 · 实时词云</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #ffffff;
    color: #17314d;
  }
  #stage { position: absolute; inset: 0; }
  canvas.cloud {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transition: opacity .6s ease;
  }
  header {
    position: absolute; top: 40px; left: 0; right: 0;
    text-align: center; pointer-events: none; z-index: 5;
  }
  header h1 {
    font-size: clamp(22px, 3vw, 40px); font-weight: 700; letter-spacing: 2px;
  }
  header h1 .hl { color: #056de8; }
  header p { margin-top: 6px; font-size: clamp(12px, 1.2vw, 18px); color: #8590a6; letter-spacing: 1px; }
  .qr-card {
    position: absolute; right: 40px; top: 50%; transform: translateY(-50%); z-index: 5;
    background: #fff; border-radius: 16px; padding: 24px;
    text-align: center; box-shadow: 0 20px 60px rgba(23, 49, 77, .15);
    width: 280px;
  }
  .qr-card #qr img {
    display: block;
    width: 100%; height: auto;
    image-rendering: pixelated;
  }
  .qr-card .tip { margin-top: 16px; font-size: 18px; font-weight: 600; color: #121212; }
  .qr-card .url { margin-top: 6px; font-size: 14px; color: #8590a6; }
  @media (max-width: 800px) {
    .qr-card { right: 20px; top: auto; bottom: 20px; transform: none; width: 140px; padding: 12px; }
    .qr-card .tip { font-size: 14px; margin-top: 8px; }
    .qr-card .url { display: none; }
    header { right: 0; }
  }
  .stats {
    position: absolute; left: 32px; bottom: 32px; z-index: 5;
    color: #8590a6; font-size: 15px; letter-spacing: 1px;
  }
  .stats b { color: #056de8; font-size: 30px; font-weight: 700; margin: 0 6px; font-variant-numeric: tabular-nums; }
  .paused-badge {
    display: none;
    position: absolute; top: 32px; right: 32px; z-index: 5;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(252, 195, 4, .12); border: 1px solid rgba(252, 195, 4, .55);
    color: #fcc304; font-size: 14px; letter-spacing: 2px;
  }
  .empty-hint {
    position: absolute; left: 50%; top: 48%; transform: translate(-50%, -50%);
    color: #3c5a82; font-size: clamp(18px, 2vw, 28px); letter-spacing: 3px;
    pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>
  <header>
    <h1>用 1 个词描述 <span class="hl">「你心中的知乎」</span></h1>
    <p>扫右下角二维码，你的词马上出现在这里</p>
  </header>
  <div class="paused-badge" id="paused">已暂停收集</div>
  <div id="stage">
    <div class="empty-hint" id="empty">等待第一个词…</div>
    <canvas class="cloud" id="c1"></canvas>
    <canvas class="cloud" id="c2" style="opacity:0"></canvas>
  </div>
  <div class="stats">已收到<b id="total">0</b>个词</div>
  <div class="qr-card">
    <div id="qr"></div>
    <div class="tip">扫码参与</div>
    <a class="url" id="joinUrl" href="https://zhihu.aiechohub.com/join" target="_blank" style="text-decoration:none;"></a>
  </div>
<script src="/js/wordcloud2.js"></script>
<script src="/js/qrcode.js"></script>
<script>
(function () {
  // 品牌色：知乎蓝、红、绿、紫
  var TIERS = ["#056de8", "#ef465d", "#42ae3b", "#7040da"];

  var canvases = [document.getElementById("c1"), document.getElementById("c2")];
  var front = 0;
  var lastData = "";
  var lastList = [];
  var dpr = 1;

  // 现场排障：地址栏加 #debug 显示日志浮层
  var DBG = location.hash === "#debug";
  function dbg(m) {
    if (!DBG) return;
    var el = document.getElementById("dbg");
    if (!el) {
      el = document.createElement("div");
      el.id = "dbg";
      el.style.cssText = "position:absolute;left:8px;top:8px;z-index:99;color:#fff;font:12px monospace;white-space:pre;text-shadow:0 0 4px #000";
      document.body.appendChild(el);
    }
    el.textContent += m + "\n";
  }
  window.addEventListener("error", function (e) { dbg("ERR " + e.message + " @" + e.lineno); });

  function sizeCanvases() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvases.forEach(function (c) {
      c.width = window.innerWidth * dpr;
      c.height = window.innerHeight * dpr;
    });
  }

  // 设置 canvas.width 会清空画布，所以 resize 后必须立即重绘
  function handleResize() {
    dbg("resize " + window.innerWidth + "x" + window.innerHeight);
    sizeCanvases();
    if (lastList.length) {
      lastData = "";
      draw(lastList);
    } else {
      drawScene(canvases[front]);
    }
  }

  // 底座图形：知乎品牌核心图形「对话框」（B-1/B-2 规范）
  // = 直角矩形「几何图形」+ 左下 66°34′ 的「角」（角度为规范强制值，不可更改）
  var TAIL_ANGLE = ((66 + 34 / 60) * Math.PI) / 180;

  // 留出右侧二维码空间
  function bubbleRect(W, H) {
    var rightSpace = W > 800 ? 340 : 0;
    var availW = W - rightSpace;
    var bx = availW * 0.08, bw = availW * 0.84;
    var by = H * 0.16, bh = H * 0.62;
    var tailH = Math.min(bh * 0.1, H * 0.05);
    return { bx: bx, by: by, bw: bw, bh: bh, tailH: tailH };
  }

  function tracePath(ctx, g) {
    var bx = g.bx, by = g.by, bw = g.bw, bh = g.bh;
    var bot = by + bh;
    var h = g.tailH;
    var w = h / Math.tan(TAIL_ANGLE); // 「角」与水平线夹角 66°34′，窄而深
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + bw, by);
    ctx.lineTo(bx + bw, bot);
    ctx.lineTo(bx + w, bot);
    ctx.lineTo(bx, bot + h); // 角尖在左边缘延长线上，左边缘保持垂直
    ctx.closePath();
  }

  // 画遮罩场景：气泡外为不透明底色（词云禁区），气泡内透出页面背景（词云画布）
  function drawScene(canvas) {
    var ctx = canvas.getContext("2d");
    var W = canvas.width, H = canvas.height;
    var g = bubbleRect(W, H);
    ctx.clearRect(0, 0, W, H);
    // 填充遮罩，外面是纯白
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, W, H);
    // 挖出气泡内部
    ctx.save();
    ctx.globalCompositeOperation = "destination-out";
    tracePath(ctx, g);
    ctx.fill();
    ctx.restore();
    // 品牌蓝描边（B-2 描边式扩展图形）
    ctx.save();
    ctx.shadowColor = "rgba(5, 109, 232, .15)";
    ctx.shadowBlur = 12 * dpr;
    ctx.strokeStyle = "#056de8";
    ctx.lineWidth = 2 * dpr;
    tracePath(ctx, g);
    ctx.stroke();
    ctx.restore();

    return g;
  }

  sizeCanvases();
  drawScene(canvases[0]);
  dbg("init " + canvases[0].width + "x" + canvases[0].height + " WC=" + typeof WordCloud);
  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleResize, 200);
  });

  // 二维码指向提交页
  (function () {
    var url = "https://zhihu.aiechohub.com/join";
    var qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    // 高清生成（cellSize 6），实际显示尺寸由 CSS clamp 控制
    document.getElementById("qr").innerHTML = qr.createImgTag(6, 12);
    document.getElementById("joinUrl").textContent = "zhihu.aiechohub.com/join";
  })();

  function draw(words) {
    lastList = words;
    var back = canvases[1 - front];
    var g = drawScene(back);
    var maxCount = words[0][1];
    var base = Math.min(g.bw, g.bh);
    dbg("draw n=" + words.length + " base=" + Math.round(base));

    WordCloud(back, {
      list: words,
      clearCanvas: false,
      backgroundColor: "transparent",
      origin: [g.bx + g.bw / 2, g.by + g.bh / 2],
      gridSize: Math.max(8, Math.round(base / 85)),
      weightFactor: function (count) {
        var r = Math.pow(count / maxCount, 0.6);
        return Math.max(base / 42, r * (base / 5));
      },
      color: function (word, count) {
        var r = count / maxCount;
        if (r >= 0.7) return TIERS[0];
        if (r >= 0.45) return TIERS[1];
        if (r >= 0.2) return TIERS[2];
        return TIERS[3];
      },
      fontFamily: '"PingFang SC", "Microsoft YaHei", sans-serif',
      fontWeight: 600,
      // wordcloud2 对 CJK 竖排词碰撞检测有缺陷会重叠，全横排（投屏可读性也更好）
      rotateRatio: 0,
      drawOutOfBound: false,
      shuffle: false,
    });

    // 双画布交叉淡入，避免重绘闪烁
    setTimeout(function () {
      dbg("swap -> " + (1 - front));
      back.style.opacity = 1;
      canvases[front].style.opacity = 0;
      front = 1 - front;
    }, 350);
  }

  function poll() {
    fetch("/api/words")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        dbg("poll total=" + d.total);
        document.getElementById("total").textContent = d.total;
        document.getElementById("paused").style.display = d.paused ? "block" : "none";
        document.getElementById("empty").style.display = d.total > 0 ? "none" : "block";
        var list = d.words.map(function (w) { return [w.word, w.count]; });
        var key = JSON.stringify(list);
        if (list.length && key !== lastData) {
          lastData = key;
          draw(list);
        }
      })
      .catch(function () { /* 网络抖动，下一轮重试 */ })
      .finally(function () { setTimeout(poll, 2000); });
  }
  poll();

  // F 键全屏
  document.addEventListener("keydown", function (e) {
    if (e.key === "f" || e.key === "F") {
      document.fullscreenElement
        ? document.exitFullscreen()
        : document.documentElement.requestFullscreen();
    }
  });

  // Wake Lock：防止投屏机器息屏
  if ("wakeLock" in navigator) {
    var acquire = function () {
      navigator.wakeLock.request("screen").catch(function () {});
    };
    acquire();
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") acquire();
    });
  }
})();
</script>
</body>
</html>
