<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>你心中的知乎 · 实时词云</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(ellipse at 50% 40%, #16213a 0%, #0d1322 70%, #090d18 100%);
    color: #e8f0fb;
  }
  #stage { position: absolute; inset: 0; }
  canvas.cloud {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transition: opacity .6s ease;
  }
  header {
    position: absolute; top: 36px; left: 0; right: 0;
    text-align: center; pointer-events: none; z-index: 5;
  }
  header h1 {
    font-size: clamp(22px, 3vw, 40px); font-weight: 700; letter-spacing: 2px;
  }
  header h1 .hl { color: #4da3ff; }
  header p { margin-top: 6px; font-size: clamp(12px, 1.2vw, 18px); color: #7b8aa5; letter-spacing: 1px; }
  .qr-card {
    position: absolute; right: 32px; bottom: 32px; z-index: 5;
    background: #fff; border-radius: 14px; padding: 14px 14px 10px;
    text-align: center; box-shadow: 0 8px 40px rgba(0, 60, 160, .45);
  }
  .qr-card #qr { display: block; line-height: 0; }
  .qr-card #qr img { display: block; }
  .qr-card .tip { margin-top: 8px; font-size: 14px; font-weight: 600; color: #121212; }
  .stats {
    position: absolute; left: 32px; bottom: 32px; z-index: 5;
    color: #7b8aa5; font-size: 15px; letter-spacing: 1px;
  }
  .stats b { color: #4da3ff; font-size: 30px; font-weight: 700; margin: 0 6px; font-variant-numeric: tabular-nums; }
  .paused-badge {
    display: none;
    position: absolute; top: 32px; right: 32px; z-index: 5;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(255, 170, 0, .15); border: 1px solid rgba(255, 170, 0, .5);
    color: #ffb84d; font-size: 14px; letter-spacing: 2px;
  }
  .empty-hint {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #3d4c66; font-size: clamp(18px, 2vw, 28px); letter-spacing: 3px;
    pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>
  <header>
    <h1>用 1 个词描述 <span class="hl">「你心中的知乎」</span></h1>
    <p>扫右下角二维码，你的词马上出现在这里</p>
  </header>
  <div class="paused-badge" id="paused">已暂停收集</div>
  <div id="stage">
    <div class="empty-hint" id="empty">等待第一个词…</div>
    <canvas class="cloud" id="c1"></canvas>
    <canvas class="cloud" id="c2" style="opacity:0"></canvas>
  </div>
  <div class="stats">已收到<b id="total">0</b>个词</div>
  <div class="qr-card">
    <div id="qr"></div>
    <div class="tip">扫码参与</div>
  </div>
<script src="/js/wordcloud2.js"></script>
<script src="/js/qrcode.js"></script>
<script>
(function () {
  // 频次分档配色（顺序色：越热门越亮），已按深色底通过对比度校验
  var TIERS = ["#D9EDFF", "#A9D5FF", "#71B8FF", "#3D9EFF", "#0084FF"];

  var canvases = [document.getElementById("c1"), document.getElementById("c2")];
  var front = 0;
  var lastData = "";

  function sizeCanvases() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvases.forEach(function (c) {
      c.width = window.innerWidth * dpr;
      c.height = window.innerHeight * dpr;
    });
    lastData = ""; // 触发重绘
  }
  sizeCanvases();
  window.addEventListener("resize", sizeCanvases);

  // 二维码指向提交页
  (function () {
    var url = location.origin + "/";
    var qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    document.getElementById("qr").innerHTML = qr.createImgTag(5, 8);
  })();

  function draw(words) {
    var back = canvases[1 - front];
    var maxCount = words[0][1];
    var base = Math.min(back.width, back.height);

    WordCloud(back, {
      list: words,
      backgroundColor: "transparent",
      gridSize: Math.max(10, Math.round(base / 90)),
      weightFactor: function (count) {
        var r = Math.pow(count / maxCount, 0.6);
        return Math.max(base / 55, r * (base / 7.5));
      },
      color: function (word, count) {
        var r = count / maxCount;
        if (r >= 0.75) return TIERS[0];
        if (r >= 0.5) return TIERS[1];
        if (r >= 0.3) return TIERS[2];
        if (r >= 0.15) return TIERS[3];
        return TIERS[4];
      },
      fontFamily: '"PingFang SC", "Microsoft YaHei", sans-serif',
      fontWeight: 600,
      rotateRatio: 0.25,
      rotationSteps: 2,
      minRotation: -Math.PI / 2,
      maxRotation: Math.PI / 2,
      drawOutOfBound: false,
      shuffle: false,
    });

    // 双画布交叉淡入，避免重绘闪烁
    setTimeout(function () {
      back.style.opacity = 1;
      canvases[front].style.opacity = 0;
      front = 1 - front;
    }, 350);
  }

  function poll() {
    fetch("/api/words")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        document.getElementById("total").textContent = d.total;
        document.getElementById("paused").style.display = d.paused ? "block" : "none";
        document.getElementById("empty").style.display = d.total > 0 ? "none" : "flex";
        var list = d.words.map(function (w) { return [w.word, w.count]; });
        var key = JSON.stringify(list);
        if (list.length && key !== lastData) {
          lastData = key;
          draw(list);
        }
      })
      .catch(function () { /* 网络抖动，下一轮重试 */ })
      .finally(function () { setTimeout(poll, 2000); });
  }
  poll();

  // F 键全屏
  document.addEventListener("keydown", function (e) {
    if (e.key === "f" || e.key === "F") {
      document.fullscreenElement
        ? document.exitFullscreen()
        : document.documentElement.requestFullscreen();
    }
  });

  // Wake Lock：防止投屏机器息屏
  if ("wakeLock" in navigator) {
    var acquire = function () {
      navigator.wakeLock.request("screen").catch(function () {});
    };
    acquire();
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") acquire();
    });
  }
})();
</script>
</body>
</html>
